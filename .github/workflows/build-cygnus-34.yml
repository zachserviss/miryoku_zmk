name: 'Build Cygnus 34'
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["nice_nano_v2"]'
      shield: '["cygnus_34_left","cygnus_34_right","settings_reset"]'
      branches: '["zachserviss/zmk/main"]'
      
